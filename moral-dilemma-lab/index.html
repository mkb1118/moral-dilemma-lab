<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>道德困境实验室 | Moral Dilemma Lab</title>
<style>
  /* ============================================
     CIRCUIT ELEGANCE DESIGN SYSTEM
     ============================================ */
  :root {
    --bg-deep: #060b12;
    --bg-card: #0c1520;
    --bg-card-hover: #101c2a;
    --cyan: #00e5ff;
    --cyan-dim: rgba(0, 229, 255, 0.15);
    --amber: #f5a623;
    --amber-dim: rgba(245, 166, 35, 0.15);
    --white: #f0f4f8;
    --white-dim: rgba(240, 244, 248, 0.6);
    --border: rgba(240, 244, 248, 0.08);
    --border-active: rgba(240, 244, 248, 0.2);
    --danger: #ff4d6a;
    --success: #00e676;
    --font-display: 'Segoe UI', system-ui, -apple-system, sans-serif;
    --font-mono: 'Cascadia Code', 'Fira Code', 'JetBrains Mono', monospace;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg-deep);
    color: var(--white);
    font-family: var(--font-display);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow-x: hidden;
  }

  /* Circuit trace background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      linear-gradient(90deg, var(--border) 1px, transparent 1px),
      linear-gradient(0deg, var(--border) 1px, transparent 1px);
    background-size: 60px 60px;
    mask-image: radial-gradient(ellipse at center, black 30%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  /* Animated node particles */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(2px 2px at 20% 30%, var(--cyan), transparent),
      radial-gradient(2px 2px at 70% 20%, var(--amber), transparent),
      radial-gradient(1px 1px at 40% 70%, var(--cyan), transparent),
      radial-gradient(2px 2px at 80% 60%, var(--amber), transparent),
      radial-gradient(1px 1px at 10% 80%, var(--cyan), transparent),
      radial-gradient(2px 2px at 60% 40%, var(--cyan-dim), transparent),
      radial-gradient(1px 1px at 30% 50%, var(--amber-dim), transparent),
      radial-gradient(1px 1px at 90% 10%, var(--white-dim), transparent);
    pointer-events: none;
    z-index: 0;
    animation: nodePulse 4s ease-in-out infinite alternate;
  }

  @keyframes nodePulse {
    0% { opacity: 0.5; }
    100% { opacity: 1; }
  }

  /* ============================================
     MAIN CONTAINER
     ============================================ */
  .app {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 720px;
    padding: 24px;
  }

  /* ============================================
     SCREENS
     ============================================ */
  .screen {
    display: none;
    flex-direction: column;
    align-items: center;
    animation: fadeSlideIn 0.5s ease;
  }
  .screen.active {
    display: flex;
  }

  @keyframes fadeSlideIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ============================================
     WELCOME SCREEN
     ============================================ */
  .welcome-icon {
    width: 80px; height: 80px;
    border: 2px solid var(--cyan);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 32px;
    position: relative;
  }
  .welcome-icon::before {
    content: '';
    position: absolute;
    inset: -8px;
    border: 1px solid var(--cyan-dim);
    border-radius: 50%;
  }
  .welcome-icon::after {
    content: '';
    position: absolute;
    inset: -16px;
    border: 1px solid rgba(0, 229, 255, 0.05);
    border-radius: 50%;
  }
  .welcome-icon svg { width: 36px; height: 36px; fill: none; stroke: var(--cyan); stroke-width: 1.5; }

  .title-block {
    text-align: center;
    margin-bottom: 12px;
  }
  .title-block .label {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--amber);
    text-transform: uppercase;
    margin-bottom: 16px;
  }
  .title-block h1 {
    font-size: 42px;
    font-weight: 200;
    letter-spacing: 2px;
    line-height: 1.2;
    color: var(--white);
  }
  .title-block h1 span { color: var(--cyan); font-weight: 400; }

  .subtitle {
    color: var(--white-dim);
    font-size: 16px;
    font-weight: 300;
    text-align: center;
    max-width: 440px;
    line-height: 1.6;
    margin-bottom: 40px;
  }

  .dilemma-count-badge {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 8px 20px;
    border: 1px solid var(--border);
    border-radius: 24px;
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--white-dim);
    margin-bottom: 20px;
  }
  .dilemma-count-badge .dot {
    width: 6px; height: 6px;
    background: var(--cyan);
    border-radius: 50%;
    animation: blink 2s ease-in-out infinite;
  }

  /* Name input */
  .name-input-wrap {
    margin-bottom: 24px;
    width: 100%;
    max-width: 360px;
  }
  .name-input {
    width: 100%;
    padding: 14px 20px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--white);
    font-family: var(--font-display);
    font-size: 16px;
    font-weight: 300;
    text-align: center;
    transition: border-color 0.3s ease, background 0.3s ease;
    outline: none;
  }
  .name-input:focus {
    border-color: var(--cyan);
    background: var(--bg-card-hover);
  }
  .name-input::placeholder {
    color: var(--white-dim);
    opacity: 0.3;
    font-weight: 300;
  }
  .name-hint {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--white-dim);
    opacity: 0.4;
    text-align: center;
    margin-top: 8px;
    letter-spacing: 1px;
  }
  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  /* ============================================
     BUTTONS
     ============================================ */
  .btn {
    display: inline-flex; align-items: center; gap: 10px;
    padding: 14px 36px;
    border: 1px solid var(--border-active);
    border-radius: 4px;
    background: transparent;
    color: var(--white);
    font-family: var(--font-mono);
    font-size: 13px;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.3s ease;
    text-decoration: none;
    position: relative;
    overflow: hidden;
  }
  .btn::after {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--cyan);
    opacity: 0;
    transition: opacity 0.3s ease;
    z-index: -1;
  }
  .btn:hover {
    border-color: var(--cyan);
    transform: translateY(-1px);
  }
  .btn:hover::after { opacity: 0.1; }
  .btn.primary {
    background: var(--cyan-dim);
    border-color: var(--cyan);
  }
  .btn.primary:hover::after { opacity: 0.2; }

  /* ============================================
     PROGRESS BAR
     ============================================ */
  .progress-wrap {
    width: 100%;
    margin-bottom: 32px;
  }
  .progress-info {
    display: flex; justify-content: space-between;
    margin-bottom: 8px;
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--white-dim);
    letter-spacing: 1px;
  }
  .progress-track {
    width: 100%; height: 2px;
    background: var(--border);
    border-radius: 1px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--cyan);
    transition: width 0.5s ease;
    border-radius: 1px;
  }

  /* ============================================
     DILEMMA CARD
     ============================================ */
  .dilemma-card {
    width: 100%;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 40px;
    margin-bottom: 28px;
    position: relative;
  }
  .dilemma-card::before {
    content: '';
    position: absolute;
    top: 0; left: 40px; right: 40px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--cyan-dim), transparent);
  }

  .dilemma-number {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--amber);
    margin-bottom: 20px;
  }

  .dilemma-scenario {
    font-size: 20px;
    font-weight: 300;
    line-height: 1.7;
    color: var(--white);
    margin-bottom: 12px;
  }

  .dilemma-context {
    font-size: 14px;
    color: var(--white-dim);
    font-weight: 300;
    line-height: 1.6;
    font-style: italic;
  }

  /* Choice buttons */
  .choices {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .choice-btn {
    width: 100%;
    padding: 20px 28px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--white);
    font-family: var(--font-display);
    font-size: 16px;
    font-weight: 400;
    cursor: pointer;
    transition: all 0.3s ease;
    text-align: left;
    position: relative;
    display: flex; align-items: center; gap: 16px;
  }
  .choice-btn:hover {
    border-color: var(--cyan);
    background: var(--bg-card-hover);
    transform: translateX(4px);
  }
  .choice-btn .choice-marker {
    width: 12px; height: 12px;
    border: 2px solid var(--border-active);
    border-radius: 50%;
    flex-shrink: 0;
    transition: all 0.3s ease;
  }
  .choice-btn:hover .choice-marker {
    border-color: var(--cyan);
    background: var(--cyan-dim);
  }
  .choice-btn .choice-text {
    flex: 1;
  }
  .choice-btn .choice-subtitle {
    display: block;
    font-size: 12px;
    color: var(--white-dim);
    font-weight: 300;
    margin-top: 4px;
  }

  /* ============================================
     RESULTS SCREEN
     ============================================ */
  .results-header {
    text-align: center;
    margin-bottom: 40px;
  }
  .results-header .label {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--amber);
    text-transform: uppercase;
    margin-bottom: 12px;
  }
  .results-header h2 {
    font-size: 32px;
    font-weight: 200;
    letter-spacing: 1px;
    color: var(--white);
  }

  .archetype-card {
    width: 100%;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 36px;
    text-align: center;
    margin-bottom: 28px;
    position: relative;
  }
  .archetype-card::after {
    content: '';
    position: absolute;
    inset: -1px;
    border-radius: 8px;
    padding: 1px;
    background: linear-gradient(135deg, var(--cyan-dim), transparent, var(--amber-dim));
    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;
    pointer-events: none;
  }
  .archetype-emoji {
    font-size: 48px;
    margin-bottom: 12px;
  }
  .archetype-name {
    font-size: 28px;
    font-weight: 300;
    color: var(--cyan);
    letter-spacing: 2px;
    margin-bottom: 4px;
  }
  .archetype-subtitle {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--amber);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 14px;
  }
  .archetype-desc {
    color: var(--white-dim);
    font-size: 15px;
    line-height: 1.7;
    font-weight: 300;
  }

  /* Insight grid */
  .insight-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 28px;
    width: 100%;
  }
  .insight-box {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 24px;
  }
  .insight-icon { font-size: 24px; margin-bottom: 8px; }
  .insight-label {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--white-dim);
    margin-bottom: 8px;
    text-transform: uppercase;
  }
  .insight-text {
    color: var(--white);
    font-size: 14px;
    line-height: 1.6;
    font-weight: 300;
  }

  /* Life sections */
  .life-section {
    width: 100%;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 24px;
    margin-bottom: 12px;
    border-left: 2px solid var(--cyan-dim);
  }
  .life-title {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--amber);
    margin-bottom: 10px;
    text-transform: uppercase;
  }
  .life-text {
    color: var(--white-dim);
    font-size: 14px;
    line-height: 1.7;
    font-weight: 300;
  }

  /* Quote */
  .quote-section {
    width: 100%;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 28px 32px;
    margin-bottom: 28px;
    text-align: center;
    position: relative;
  }
  .quote-mark {
    font-size: 60px;
    font-family: Georgia, serif;
    color: var(--cyan-dim);
    line-height: 1;
    margin-bottom: -10px;
    opacity: 0.5;
  }
  .quote-text {
    color: var(--white);
    font-size: 16px;
    line-height: 1.7;
    font-weight: 300;
    font-style: italic;
  }

  /* Radar chart */
  .chart-container {
    width: 100%;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 32px;
    margin-bottom: 28px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .chart-title {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--white-dim);
    margin-bottom: 24px;
  }
  canvas#radarChart {
    max-width: 340px;
    width: 100%;
  }

  /* Dimension bars */
  .dimensions {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 16px;
    margin-bottom: 28px;
  }
  .dimension-item {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 20px 24px;
  }
  .dimension-header {
    display: flex; justify-content: space-between; align-items: baseline;
    margin-bottom: 10px;
  }
  .dimension-name {
    font-size: 14px;
    font-weight: 400;
    letter-spacing: 0.5px;
  }
  .dimension-value {
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--cyan);
  }
  .dimension-bar-track {
    width: 100%; height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
    margin-bottom: 6px;
  }
  .dimension-bar-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 1s ease 0.3s;
  }
  .dimension-bar-fill.cyan { background: var(--cyan); }
  .dimension-bar-fill.amber { background: var(--amber); }
  .dimension-labels {
    display: flex; justify-content: space-between;
    font-size: 11px;
    color: var(--white-dim);
    font-family: var(--font-mono);
  }

  /* Choice review */
  .review-section {
    width: 100%;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 28px;
    margin-bottom: 28px;
  }
  .review-title {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--white-dim);
    margin-bottom: 20px;
  }
  .review-item {
    display: flex; align-items: center; gap: 14px;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
    font-size: 14px;
  }
  .review-item:last-child { border-bottom: none; }
  .review-marker {
    width: 10px; height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .review-marker.utilitarian { background: var(--cyan); }
  .review-marker.deontological { background: var(--amber); }
  .review-label { flex: 1; font-weight: 300; }
  .review-choice-text {
    font-size: 12px;
    color: var(--white-dim);
    font-weight: 300;
  }

  /* Action buttons */
  .action-row {
    display: flex; gap: 12px; flex-wrap: wrap; justify-content: center;
    margin-bottom: 20px;
  }

  /* Stats section */
  .stats-section {
    width: 100%;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 28px;
    margin-bottom: 28px;
  }
  .stats-title {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--white-dim);
    margin-bottom: 20px;
    display: flex; align-items: center; gap: 8px;
  }
  .stats-title .live-dot {
    width: 6px; height: 6px;
    background: var(--success);
    border-radius: 50%;
    animation: blink 2s ease-in-out infinite;
  }
  .stat-item {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
  }
  .stat-item:last-child { border-bottom: none; }
  .stat-dilemma-label {
    font-size: 12px;
    color: var(--white-dim);
    font-family: var(--font-mono);
    min-width: 100px;
    flex-shrink: 0;
  }
  .stat-bar-wrap {
    flex: 1;
    height: 6px;
    background: var(--border);
    border-radius: 3px;
    overflow: hidden;
    position: relative;
  }
  .stat-bar-fill {
    height: 100%;
    background: var(--cyan-dim);
    border-radius: 3px;
    transition: width 1s ease;
    position: relative;
  }
  .stat-bar-fill.majority {
    background: rgba(0, 229, 255, 0.3);
  }
  .stat-bar-fill.minority {
    background: rgba(245, 166, 35, 0.3);
  }
  .stat-pct {
    font-family: var(--font-mono);
    font-size: 12px;
    min-width: 44px;
    text-align: right;
  }
  .stat-pct.cyan { color: var(--cyan); }
  .stat-pct.amber { color: var(--amber); }
  .stat-your-choice {
    font-size: 10px;
    color: var(--white-dim);
    min-width: 60px;
    text-align: right;
    line-height: 1.3;
  }

  .archetype-dist {
    display: flex; gap: 8px; flex-wrap: wrap; margin-top: 16px;
  }
  .archetype-tag {
    padding: 6px 14px;
    border: 1px solid var(--border);
    border-radius: 20px;
    font-size: 12px;
    color: var(--white-dim);
    font-family: var(--font-mono);
    display: flex; align-items: center; gap: 6px;
  }
  .archetype-tag.highlight {
    border-color: var(--cyan);
    color: var(--cyan);
  }
  .archetype-tag .tag-count {
    font-weight: 600;
  }

  .stats-loading {
    text-align: center;
    color: var(--white-dim);
    font-family: var(--font-mono);
    font-size: 12px;
    padding: 20px;
    letter-spacing: 1px;
  }

  .stats-error {
    text-align: center;
    color: var(--amber);
    font-family: var(--font-mono);
    font-size: 11px;
    padding: 12px;
    opacity: 0.7;
  }

  .total-sessions {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--white-dim);
    opacity: 0.6;
    margin-top: 12px;
    text-align: right;
  }

  /* Footer */
  .footer-note {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--white-dim);
    opacity: 0.5;
    letter-spacing: 1px;
    text-align: center;
  }

  /* Section break (between dilemma groups) */
  .section-break {
    width: 100%;
    text-align: center;
    padding: 20px 0;
    animation: fadeSlideIn 0.6s ease;
  }
  .section-break-icon { font-size: 28px; margin-bottom: 8px; }
  .section-break-title {
    font-family: var(--font-display);
    font-size: 18px;
    font-weight: 300;
    color: var(--cyan);
    letter-spacing: 1px;
    margin-bottom: 6px;
  }
  .section-break-subtitle {
    font-size: 13px;
    color: var(--white-dim);
    font-weight: 300;
    line-height: 1.5;
    opacity: 0.6;
  }

  /* Insight badge in results */
  .insight-badge {
    display: inline-block;
    padding: 6px 14px;
    border-radius: 16px;
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 1px;
    margin: 4px;
  }
  .insight-badge.pattern { background: var(--cyan-dim); color: var(--cyan); border: 1px solid rgba(0,229,255,0.2); }
  .insight-badge.warning { background: var(--amber-dim); color: var(--amber); border: 1px solid rgba(245,166,35,0.2); }

  /* Discoveries section */
  .discoveries-section {
    width: 100%;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 24px;
    margin-bottom: 28px;
    border-left: 2px solid var(--amber);
  }
  .discoveries-title {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--amber);
    margin-bottom: 12px;
    text-transform: uppercase;
  }
  .discovery-item {
    display: flex; gap: 10px;
    padding: 8px 0;
    align-items: flex-start;
    font-size: 14px;
    line-height: 1.6;
    color: var(--white-dim);

let currentDilemma = 0;
let answers = [];

// ============================================
// NAVIGATION
// ============================================
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ============================================
// QUIZ LOGIC
// ============================================
function startQuiz() {
  currentDilemma = 0;
  answers = [];
  showScreen('quiz');
  renderDilemma();
}

// Section breaks between dilemma groups
const SECTIONS = [
  { atIndex: 0, icon: '🌓', title: '第一章：生与死的选择', subtitle: '生命有价吗？一个人和一群人，天平的两端。接下来的两道题，会触碰这个人类最古老的道德难题。' },
  { atIndex: 2, icon: '💫', title: '第二章：真与情的博弈', subtitle: '真相值得捍卫吗，哪怕伤害在乎的人？忠诚是美德还是盲区？接下来的三道题，关于人与人之间最微妙的纽带。' },
  { atIndex: 5, icon: '🔮', title: '第三章：自由与秩序的边界', subtitle: '你愿意交出多少自己，来换取多少安全？个人的权利和集体的秩序，边界在哪里？最后三道题，关于你与这个世界的关系。' },
];

function renderDilemma() {
  const d = DILEMMAS[currentDilemma];
  const pct = Math.round((currentDilemma / DILEMMAS.length) * 100);

  // Check if this is a section start
  const section = SECTIONS.find(s => s.atIndex === currentDilemma);
  if (section) {
    const card = document.getElementById('dilemmaCard');
    const choicesEl = document.getElementById('choices');
    card.style.display = 'none';
    choicesEl.innerHTML = '';

    // Show section break
    const breakHtml = `
      <div class="section-break" id="sectionBreak">
        <div class="section-break-icon">${section.icon}</div>
        <div class="section-break-title">${section.title}</div>
        <div class="section-break-subtitle">${section.subtitle}</div>
        <button class="btn primary" style="margin-top:20px;" onclick="continueFromBreak()">继续 →</button>
      </div>
    `;
    // Insert break before the card
    const quizScreen = document.getElementById('quiz');
    const progressWrap = document.querySelector('.progress-wrap');
    const existingBreak = document.getElementById('sectionBreak');
    if (existingBreak) existingBreak.remove();
    progressWrap.insertAdjacentHTML('afterend', breakHtml);
    return;
  }

  // Remove any existing break
  const existingBreak = document.getElementById('sectionBreak');
  if (existingBreak) existingBreak.remove();
  document.getElementById('dilemmaCard').style.display = 'block';

  document.getElementById('progressLabel').textContent = `困境 ${currentDilemma + 1} / ${DILEMMAS.length}`;
  document.getElementById('progressPct').textContent = `${pct}%`;
  document.getElementById('progressFill').style.width = `${pct}%`;
  document.getElementById('dilemmaNumber').textContent = d.title;
  document.getElementById('dilemmaScenario').textContent = d.scenario;
  document.getElementById('dilemmaContext').textContent = d.context;

  const choicesEl = document.getElementById('choices');
  choicesEl.innerHTML = `
    <button class="choice-btn" onclick="choose('A')">
      <span class="choice-marker"></span>
      <span class="choice-text">
        ${d.choiceA.text}
        <span class="choice-subtitle">${d.choiceA.subtitle}</span>
      </span>
    </button>
    <button class="choice-btn" onclick="choose('B')">
      <span class="choice-marker"></span>
      <span class="choice-text">
        ${d.choiceB.text}
        <span class="choice-subtitle">${d.choiceB.subtitle}</span>
      </span>
    </button>
  `;

  // Animate card in
  const card = document.getElementById('dilemmaCard');
  card.style.opacity = '0';
  card.style.transform = 'translateY(10px)';
  requestAnimationFrame(() => {
    card.style.transition = 'all 0.4s ease';
    card.style.opacity = '1';
    card.style.transform = 'translateY(0)';
  });
}

function continueFromBreak() {
  const breakEl = document.getElementById('sectionBreak');
  if (breakEl) breakEl.remove();
  document.getElementById('dilemmaCard').style.display = 'block';
  renderDilemma();
}

function choose(choice) {
  const d = DILEMMAS[currentDilemma];
  const selected = choice === 'A' ? d.choiceA : d.choiceB;
  answers.push({
    dilemmaId: d.id,
    title: d.title,
    choice: choice,
    choiceText: selected.text,
    scores: selected.scores
  });

  currentDilemma++;

  if (currentDilemma >= DILEMMAS.length) {
    // Update progress to 100%
    document.getElementById('progressLabel').textContent = `困境 ${DILEMMAS.length} / ${DILEMMAS.length}`;
    document.getElementById('progressPct').textContent = '100%';
    document.getElementById('progressFill').style.width = '100%';

    setTimeout(() => showResults(), 400);
  } else {
    renderDilemma();
  }
}

// ============================================
// RESULTS CALCULATION
// ============================================
function calculateScores() {
  const totals = { utilitarian: 0, personal: 0, universal: 0, liberty: 0 };
  answers.forEach(a => {
    for (const [key, val] of Object.entries(a.scores)) {
      totals[key] += val;
    }
  });
  return totals;
}

function normalize(score, min, max) {
  return Math.max(0, Math.min(100, ((score - min) / (max - min)) * 100));
}

function getArchetype(scores) {
  const u = scores.utilitarian;
  const p = scores.personal;
  const l = scores.liberty;

  if (l >= 5 && u <= 0) return ARCHETYPES.libertarian;
  if (u >= 5) return ARCHETYPES.strongUtilitarian;
  if (p >= 4 && u <= 1) return ARCHETYPES.compassionate;
  if (u <= -4) return ARCHETYPES.strongDeontological;
  return ARCHETYPES.balanced;
}

// ── 心理学洞察：发现用户选择中的模式和矛盾 ──
function analyzePatterns() {
  const discoveries = [];

  // Pattern 1: 电车难题 vs 天桥困境 —— "双重效应"
  const q1 = answers.find(a => a.dilemmaId === 1); // 电车 - 拉杆 = A
  const q2 = answers.find(a => a.dilemmaId === 2); // 天桥 - 推人 = A
  if (q1 && q2 && q1.choice === 'A' && q2.choice === 'B') {
    discoveries.push({
      icon: '🎯',
      text: '你在电车难题中选择了拉杆，但在天桥上拒绝亲手推人。这在道德心理学中叫做<b>「双重效应区分」</b>——你直觉上区分了"间接行为"和"亲手伤害"。这不是逻辑矛盾，而是一种深刻的道德直觉：<b>手段和副作用之间有本质区别。</b>很多哲学家也这么认为。'
    });
  }

  // Pattern 2: 一致的结果主义
  const q5 = answers.find(a => a.dilemmaId === 5); // 器官移植
  if (q1 && q2 && q5 && q1.choice === 'A' && q2.choice === 'A' && q5.choice === 'B') {
    discoveries.push({
      icon: '📐',
      text: '你在生命相关的所有困境中都选择了"最大化生命数量"。你拥有<b>罕见的一致性</b>——即使面对亲手推人、器官移植这种极端场景，你的逻辑也没有动摇。这种坚定是珍贵的，但也值得问自己：<b>有没有什么东西，是再多生命也不能换的？</b>'
    });
  }

  // Pattern 3: 情感优先
  const q3 = answers.find(a => a.dilemmaId === 3); // 善意谎言
  const q8 = answers.find(a => a.dilemmaId === 8); // 昂贵药物
  if (q3 && q8 && q3.choice === 'A' && q8.choice === 'A') {
    discoveries.push({
      icon: '💙',
      text: '你在"善意的谎言"和"昂贵药物"两个困境中都选择了<b>保护具体的人</b>——那个朋友、那个孩子。对你来说，道德不是抽象的公式，而是一个个有面孔、有名字的个体。你不愿意为了最大化"总数"而牺牲任何一个具体的人。这是你道德框架的核心。'
    });
  }

  // Pattern 4: 隐私与自由 —— 一致的自由主义
  const q7 = answers.find(a => a.dilemmaId === 7); // 隐私监控
  if (q7 && q7.choice === 'B' && q2 && q2.choice === 'B') {
    discoveries.push({
      icon: '🕊️',
      text: '你反对监控法案，也拒绝在天桥上推人。这两个看似无关的选择其实指向同一个核心信念：<b>不能以"更大的善"为名，侵犯个体的基本权利。</b>无论那个"更大的善"是救五个人还是防犯罪，有些底线在你看来不可逾越。'
    });
  }

  // Pattern 5: 内部挣扎 —— 举报 vs 谎言
  const q4 = answers.find(a => a.dilemmaId === 4); // 举报
  if (q3 && q4 && q3.choice === 'A' && q4.choice === 'A') {
    discoveries.push({
      icon: '⚡',
      text: '你在"善意的谎言"中选择了保护朋友，但在"举报同事"中选择了维护规则。这看起来矛盾，其实揭示了一个微妙的区分：<b>你区分了"无害的谎言"和"有害的沉默"。</b>一场演出好不好不会伤害任何人，但出卖公司数据会。你根据伤害程度来调整你的道德判断——这是一种成熟的道德推理。'
    });
  }

  // Pattern 6: 自动驾驶悖论
  const q6 = answers.find(a => a.dilemmaId === 6); // 自动驾驶
  if (q6 && q6.choice === 'B' && q1 && q1.choice === 'A') {
    discoveries.push({
      icon: '🔮',
      text: '你在"电车难题"中选择了拉杆牺牲一人，在"自动驾驶"中又选择让算法优先保护行人——即使那意味着牺牲自己。这种<b>"自我牺牲的一致性"</b>让你的功利主义显得格外真诚：你不是只让别人牺牲，你愿意把自己也放进计算里。'
    });

  return discoveries;
}

// ── 道德风格子类型 ──
function getMoralStyle(scores) {
  const u = scores.utilitarian;
  const p = scores.personal;
  const l = scores.liberty;
  const uni = scores.universal;

  const styles = [];

  if (u >= 3 && p >= 1) styles.push('务实共情者');
  if (u <= -3 && p <= -2) styles.push('理性原则派');
  if (p >= 3 && l >= 2) styles.push('个体关怀者');
  if (u >= 2 && l <= -2) styles.push('秩序效用者');
  if (uni >= 3 && u <= 0) styles.push('普遍道义者');
  if (l >= 4) styles.push('自由意志者');

  if (styles.length === 0) {
    if (Math.abs(u) <= 2 && Math.abs(p) <= 2) styles.push('情境权衡者');
    else styles.push('复杂思辨者');
  }

  return styles[0];
}

// ============================================
// RADAR CHART
// ============================================
function drawRadar(scores) {
  const canvas = document.getElementById('radarChart');
  const ctx = canvas.getContext('2d');
  const W = canvas.width;
  const H = canvas.height;
  const cx = W / 2;
  const cy = H / 2;
  const r = 130;

  const dims = [
    { key: 'utilitarian', label: '功利主义', max: 14, min: -14 },
    { key: 'personal', label: '个人情感', max: 8, min: -8 },
    { key: 'universal', label: '普遍原则', max: 8, min: -8 },
    { key: 'liberty', label: '自由至上', max: 8, min: -8 },
    { key: 'utilitarian', label: '功利主义', max: 14, min: -14 } // repeat to close polygon
  ];

  ctx.clearRect(0, 0, W, H);

  // Grid circles
  for (let i = 1; i <= 4; i++) {
    ctx.beginPath();
    ctx.arc(cx, cy, r * (i / 4), 0, Math.PI * 2);
    ctx.strokeStyle = i === 4 ? 'rgba(240,244,248,0.12)' : 'rgba(240,244,248,0.04)';
    ctx.lineWidth = 0.5;
    ctx.stroke();
  }

  // Axis lines
  for (let i = 0; i < 4; i++) {
    const angle = (Math.PI * 2 * i) / 4 - Math.PI / 2;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(cx + r * Math.cos(angle), cy + r * Math.sin(angle));
    ctx.strokeStyle = 'rgba(240,244,248,0.06)';
    ctx.lineWidth = 0.5;
    ctx.stroke();
  }

  // Data polygon
  ctx.beginPath();
  for (let i = 0; i < 4; i++) {
    const d = dims[i];
    const normalized = (scores[d.key] - d.min) / (d.max - d.min);
    const val = Math.max(0.05, Math.min(0.95, normalized));
    const angle = (Math.PI * 2 * i) / 4 - Math.PI / 2;
    const x = cx + r * val * Math.cos(angle);
    const y = cy + r * val * Math.sin(angle);
    if (i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  }
  ctx.closePath();
  ctx.fillStyle = 'rgba(0, 229, 255, 0.08)';
  ctx.fill();
  ctx.strokeStyle = 'rgba(0, 229, 255, 0.4)';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  // Data points
  for (let i = 0; i < 4; i++) {
    const d = dims[i];
    const normalized = (scores[d.key] - d.min) / (d.max - d.min);
    const val = Math.max(0.05, Math.min(0.95, normalized));
    const angle = (Math.PI * 2 * i) / 4 - Math.PI / 2;
    const x = cx + r * val * Math.cos(angle);
    const y = cy + r * val * Math.sin(angle);
    ctx.beginPath();
    ctx.arc(x, y, 4, 0, Math.PI * 2);
    ctx.fillStyle = '#00e5ff';
    ctx.fill();
  }

  // Labels
  ctx.fillStyle = '#f0f4f8';
  ctx.font = '11px "Segoe UI", system-ui, sans-serif';
  ctx.textAlign = 'center';
  const labelOffset = r + 22;
  const labelNames = ['功利主义', '个人情感', '普遍原则', '自由至上'];
  for (let i = 0; i < 4; i++) {
    const angle = (Math.PI * 2 * i) / 4 - Math.PI / 2;
    const x = cx + labelOffset * Math.cos(angle);
    const y = cy + labelOffset * Math.sin(angle) + 4;
    ctx.fillText(labelNames[i], x, y);
  }

  // Center dot
  ctx.beginPath();
  ctx.arc(cx, cy, 2, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(240,244,248,0.3)';
  ctx.fill();
}

// TOAST
// ============================================
function showToast(msg) {
  const existing = document.querySelector('.toast');
  if (existing) existing.remove();
  const toast = document.createElement('div');
  toast.className = 'toast';
  toast.textContent = msg;
  document.body.appendChild(toast);
  setTimeout(() => toast.remove(), 2500);
}

// ============================================
// KEYBOARD SHORTCUTS
// ============================================
document.addEventListener('keydown', (e) => {
  const quizScreen = document.getElementById('quiz');
  if (!quizScreen.classList.contains('active')) return;
  if (e.key === 'a' || e.key === 'A') choose('A');
  if (e.key === 'b' || e.key === 'B') choose('B');
});
