<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>大五人格评测 · OCEAN</title>
<style>
  :root {
    --bg: #060b12; --card: #0c1520; --card-hover: #111d2c;
    --cyan: #00e5ff; --amber: #f5a623; --white: #f0f4f8;
    --dim: rgba(240,244,248,0.5); --border: rgba(240,244,248,0.06);
    --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
    --mono: 'Cascadia Code', 'Fira Code', monospace;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg); color: var(--white); font-family: var(--font);
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
  }
  body::before {
    content: ''; position: fixed; inset: 0;
    background: linear-gradient(90deg, var(--border) 1px, transparent 1px),
                linear-gradient(0deg, var(--border) 1px, transparent 1px);
    background-size: 60px 60px;
    mask-image: radial-gradient(ellipse at center, black 30%, transparent 70%);
    pointer-events: none; z-index: 0;
  }
  .app { position: relative; z-index: 1; width: 100%; max-width: 720px; padding: 24px; }

  /* Screens */
  .screen { display: none; flex-direction: column; align-items: center; animation: fadeIn 0.5s ease; }
  .screen.active { display: flex; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }

  /* Welcome */
  .welcome-icon {
    width: 72px; height: 72px; border: 2px solid var(--cyan); border-radius: 50%;
    display: flex; align-items: center; justify-content: center; margin-bottom: 28px;
    font-size: 30px;
  }
  .title-block { text-align: center; margin-bottom: 12px; }
  .title-block .label { font-family: var(--mono); font-size: 10px; letter-spacing: 4px; color: var(--amber); margin-bottom: 12px; }
  .title-block h1 { font-size: 38px; font-weight: 200; letter-spacing: 2px; }
  .title-block h1 span { color: var(--cyan); font-weight: 400; }
  .subtitle { color: var(--dim); font-size: 15px; font-weight: 300; text-align: center; max-width: 440px; line-height: 1.6; margin-bottom: 16px; }
  .info-badge {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 6px 16px; border: 1px solid var(--border); border-radius: 20px;
    font-family: var(--mono); font-size: 11px; color: var(--dim); margin-bottom: 32px;
  }
  .info-badge span { width: 5px; height: 5px; background: var(--cyan); border-radius: 50%; }

  /* Buttons */
  .btn {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 12px 32px; border: 1px solid rgba(240,244,248,0.15); border-radius: 4px;
    background: transparent; color: var(--white); font-family: var(--mono);
    font-size: 13px; letter-spacing: 1px; cursor: pointer; transition: all 0.3s;
  }
  .btn:hover { border-color: var(--cyan); background: rgba(0,229,255,0.05); }
  .btn.primary { background: rgba(0,229,255,0.08); border-color: var(--cyan); }
  .btn.primary:hover { background: rgba(0,229,255,0.15); }

  /* Progress */
  .progress-wrap { width: 100%; margin-bottom: 28px; }
  .progress-info { display: flex; justify-content: space-between; margin-bottom: 6px; font-family: var(--mono); font-size: 10px; color: var(--dim); }
  .progress-track { width: 100%; height: 2px; background: var(--border); border-radius: 1px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--cyan); transition: width 0.3s; border-radius: 1px; }

  /* Question card */
  .q-card {
    width: 100%; background: var(--card); border: 1px solid var(--border);
    border-radius: 10px; padding: 36px; margin-bottom: 24px; position: relative;
  }
  .q-card::before { content: ''; position: absolute; top: 0; left: 36px; right: 36px; height: 1px; background: linear-gradient(90deg, transparent, rgba(0,229,255,0.1), transparent); }
  .q-trait { font-family: var(--mono); font-size: 10px; letter-spacing: 3px; color: var(--amber); margin-bottom: 16px; text-transform: uppercase; }
  .q-text { font-size: 19px; font-weight: 300; line-height: 1.6; margin-bottom: 28px; }

  /* Scale */
  .scale { display: flex; justify-content: space-between; gap: 8px; }
  .scale-btn {
    flex: 1; padding: 14px 8px; background: transparent; border: 1px solid var(--border);
    border-radius: 8px; color: var(--dim); font-family: var(--font); font-size: 13px;
    cursor: pointer; transition: all 0.2s; text-align: center;
  }
  .scale-btn:hover { border-color: var(--cyan); color: var(--white); background: rgba(0,229,255,0.05); }
  .scale-btn.selected { border-color: var(--cyan); color: var(--cyan); background: rgba(0,229,255,0.08); }

  /* Results */
  .results-header { text-align: center; margin-bottom: 32px; }
  .results-header .label { font-family: var(--mono); font-size: 10px; letter-spacing: 4px; color: var(--amber); margin-bottom: 8px; }
  .results-header h2 { font-size: 28px; font-weight: 200; }

  .trait-card {
    width: 100%; background: var(--card); border: 1px solid var(--border);
    border-radius: 10px; padding: 24px 28px; margin-bottom: 12px;
  }
  .trait-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 10px; }
  .trait-name { font-size: 16px; font-weight: 400; display: flex; align-items: center; gap: 10px; }
  .trait-score { font-family: var(--mono); font-size: 12px; color: var(--cyan); }
  .trait-bar-wrap { width: 100%; height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; margin-bottom: 8px; }
  .trait-bar-fill { height: 100%; border-radius: 3px; transition: width 1.2s ease; }
  .trait-bar-fill.high { background: var(--cyan); }
  .trait-bar-fill.mid { background: rgba(0,229,255,0.5); }
  .trait-bar-fill.low { background: rgba(245,166,35,0.5); }
  .trait-labels { display: flex; justify-content: space-between; font-size: 10px; color: var(--dim); font-family: var(--mono); }
  .trait-desc { font-size: 13px; color: var(--dim); line-height: 1.6; font-weight: 300; margin-top: 8px; }

  .summary-card {
    width: 100%; background: var(--card); border: 1px solid var(--border);
    border-radius: 10px; padding: 28px; margin-bottom: 28px; text-align: center;
    border-left: 2px solid var(--cyan);
  }
  .summary-title { font-family: var(--mono); font-size: 10px; letter-spacing: 3px; color: var(--amber); margin-bottom: 10px; }
  .summary-text { font-size: 15px; line-height: 1.7; color: var(--dim); font-weight: 300; }

  .action-row { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; margin-bottom: 20px; }
  .footer-note { font-family: var(--mono); font-size: 9px; color: var(--dim); opacity: 0.4; text-align: center; }

  .toast {
    position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%);
    background: var(--card); border: 1px solid var(--cyan); color: var(--cyan);
    padding: 10px 20px; border-radius: 6px; font-family: var(--mono); font-size: 12px;
    z-index: 100; animation: toastIn 0.3s ease, toastOut 0.3s ease 2s forwards;
    pointer-events: none;
  }
  @keyframes toastIn { from { opacity: 0; transform: translateX(-50%) translateY(10px); } }
  @keyframes toastOut { to { opacity: 0; transform: translateX(-50%) translateY(-10px); } }

  /* Back button */
  .q-nav { display: flex; align-items: center; margin-bottom: 12px; width: 100%; }
  .btn-back {
    background: transparent; border: 1px solid var(--border); border-radius: 4px;
    color: var(--dim); font-family: var(--mono); font-size: 12px;
    padding: 8px 16px; cursor: pointer; transition: all 0.2s;
  }
  .btn-back:hover { border-color: var(--cyan); color: var(--cyan); }

  /* Insight row */
  .insight-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; width: 100%; margin-bottom: 16px; }
  .insight-card {
    background: var(--card); border: 1px solid var(--border); border-radius: 10px;
    padding: 20px 24px;
  }
  .insight-title {
    font-family: var(--mono); font-size: 10px; letter-spacing: 2px;
    color: var(--amber); margin-bottom: 8px; text-transform: uppercase;
  }
  .insight-content {
    color: var(--dim); font-size: 13px; line-height: 1.6; font-weight: 300;
  }

  /* Growth card */
  .growth-card {
    width: 100%; background: var(--card); border: 1px solid var(--border);
    border-radius: 10px; padding: 20px 24px; margin-bottom: 28px;
    border-left: 2px solid rgba(0,229,255,0.3);
  }
  .growth-title {
    font-family: var(--mono); font-size: 10px; letter-spacing: 2px;
    color: var(--cyan); margin-bottom: 8px; text-transform: uppercase;
  }
  .growth-content {
    color: var(--dim); font-size: 13px; line-height: 1.6; font-weight: 300;
  }

  /* Sub-facets */
  .sub-facets { margin-top: 12px; border-top: 1px solid var(--border); padding-top: 12px; }
  .sub-facet { margin-bottom: 8px; }
  .sub-header { display: flex; justify-content: space-between; margin-bottom: 3px; }
  .sub-name { font-size: 11px; color: var(--dim); }
  .sub-score { font-family: var(--mono); font-size: 10px; color: var(--dim); opacity: 0.6; }
  .sub-bar-wrap { width: 100%; height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .sub-bar-fill { height: 100%; border-radius: 2px; transition: width 1s ease; }
  .sub-bar-fill.high { background: var(--cyan); }
  .sub-bar-fill.mid { background: rgba(0,229,255,0.4); }
  .sub-bar-fill.low { background: rgba(245,166,35,0.4); }

  .tag-inline {
    display: inline-block; padding: 3px 10px; border-radius: 12px;
    font-family: var(--mono); font-size: 10px; margin: 2px;
    border: 1px solid rgba(0,229,255,0.2); color: var(--cyan);
  }

  @media (max-width: 600px) {
    .insight-row { grid-template-columns: 1fr; }
    .app { padding: 16px; }
    .q-card { padding: 24px; }
    .q-card::before { left: 24px; right: 24px; }
    .q-text { font-size: 16px; }
    .title-block h1 { font-size: 28px; }
    .scale { flex-wrap: wrap; }
    .scale-btn { flex: none; width: calc(20% - 7px); font-size: 12px; padding: 10px 4px; }
  }
</style>
</head>
<body>

<div class="app" id="app">

  <!-- ============ WELCOME ============ -->
  <div class="screen active" id="welcome">
    <div class="welcome-icon">🌊</div>
    <div class="title-block">
      <div class="label">Big Five · OCEAN Model</div>
      <h1>大五人格<br><span>深度评测</span></h1>
    </div>
    <p class="subtitle">
      基于心理学界最受认可的人格模型，从五个核心维度描绘你的人格全貌。
      这不是"对号入座"，而是一面镜子。
    </p>
    <div class="info-badge"><span></span> 40 题 · 约 6 分钟 · IPIP科学量表</div>
    <button class="btn primary" onclick="startTest()">开始测评 →</button>
  </div>

  <!-- ============ QUIZ ============ -->
  <div class="screen" id="quiz">
    <div class="progress-wrap">
      <div class="progress-info"><span id="progLabel">1 / 20</span><span id="progPct">0%</span></div>
      <div class="progress-track"><div class="progress-fill" id="progFill" style="width:0%"></div></div>
    </div>
    <div class="q-nav">
      <button class="btn-back" id="btnBack" onclick="goBack()" style="visibility:hidden;">← 上一题</button>
      <div style="flex:1;"></div>
    </div>
    <div class="q-card" id="qCard">
      <div class="q-trait" id="qTrait"></div>
      <p class="q-text" id="qText"></p>
      <div class="scale" id="scale"></div>
    </div>
  </div>

  <!-- ============ RESULTS ============ -->
  <div class="screen" id="results">
    <div class="results-header">
      <div class="label">OCEAN Profile</div>
      <h2>你的人格画像</h2>
    </div>
    <div class="summary-card">
      <div class="summary-title">Personality Summary</div>
      <p class="summary-text" id="summaryText"></p>
    </div>
    <div id="traitList"></div>

    <div class="insight-row">
      <div class="insight-card" id="insightCareer">
        <div class="insight-title">💼 职业倾向</div>
        <p class="insight-content" id="careerText"></p>
      </div>
      <div class="insight-card" id="insightRel">
        <div class="insight-title">💛 关系模式</div>
        <p class="insight-content" id="relText"></p>
      </div>
    </div>

    <div class="growth-card">
      <div class="growth-title">🌱 成长建议</div>
      <p class="growth-content" id="growthText"></p>
    </div>

    <div class="action-row">
      <button class="btn primary" onclick="restartTest()">重新测试</button>
      <button class="btn" onclick="shareResults()">📤 分享结果</button>
    </div>
    <p class="footer-note">基于 IPIP 量表改编 · 仅供自我探索，非临床诊断</p>
  </div>

</div>

<script>
// ============================================
// QUESTIONS: IPIP-based, 8 items per trait, 40 total
// Each trait has sub-facets for richer analysis
// ============================================
const QUESTIONS = [
  // O = Openness (开放性) —— 创意想象 / 审美敏感 / 思辨深度
  { id:1,  trait:'开放性', sub:'创意想象', text:'我的脑海中经常涌现出新的想法和可能性，喜欢天马行空的想象。',         key:'O', reverse:false },
  { id:2,  trait:'开放性', sub:'创意想象', text:'我对新鲜和未知的事物充满好奇，喜欢尝试没做过的事。',               key:'O', reverse:false },
  { id:3,  trait:'开放性', sub:'创意想象', text:'我喜欢用不同的角度看待熟悉的问题，寻找新的解决方式。',             key:'O', reverse:false },
  { id:4,  trait:'开放性', sub:'审美敏感', text:'我对艺术、音乐和文学有强烈的感受力，容易被美好的事物打动。',       key:'O', reverse:false },
  { id:5,  trait:'开放性', sub:'审美敏感', text:'大自然和艺术品常常让我感到敬畏和心潮澎湃。',                       key:'O', reverse:false },
  { id:6,  trait:'开放性', sub:'思辨深度', text:'我喜欢思考抽象和复杂的问题，享受智力上的挑战。',                   key:'O', reverse:false },
  { id:7,  trait:'开放性', sub:'思辨深度', text:'我对哲学、科学或社会议题有持续的探索兴趣。',                       key:'O', reverse:false },
  { id:8,  trait:'开放性', sub:'创意想象', text:'相比冒险和变化，我更喜欢熟悉和可预测的生活方式。',                 key:'O', reverse:true },

  // C = Conscientiousness (尽责性) —— 条理规划 / 坚持完成 / 细节完美
  { id:9,  trait:'尽责性', sub:'条理规划', text:'我做事有计划有条理，会提前安排好时间和优先级。',                   key:'C', reverse:false },
  { id:10, trait:'尽责性', sub:'条理规划', text:'我的房间和工作桌面通常保持整洁有序，我知道每样东西在哪。',         key:'C', reverse:false },
  { id:11, trait:'尽责性', sub:'坚持完成', text:'我对自己承诺的事情会坚持到底，很少半途而废。',                     key:'C', reverse:false },
  { id:12, trait:'尽责性', sub:'坚持完成', text:'即使任务变得困难或枯燥，我也能逼自己继续前进。',                   key:'C', reverse:false },
  { id:13, trait:'尽责性', sub:'细节完美', text:'我注重细节，追求把每件事做到最好而不仅仅是"完成"。',              key:'C', reverse:false },
  { id:14, trait:'尽责性', sub:'细节完美', text:'在提交工作之前，我会反复检查，确保没有错误。',                     key:'C', reverse:false },
  { id:15, trait:'尽责性', sub:'条理规划', text:'我喜欢随心所欲地做事，不太喜欢被计划和日程约束。',                 key:'C', reverse:true },
  { id:16, trait:'尽责性', sub:'坚持完成', text:'有时我觉得自己缺乏自律，会拖延那些需要长期坚持的事情。',           key:'C', reverse:true },

  // E = Extraversion (外向性) —— 社交能量 / 主导表达 / 积极情绪
  { id:17, trait:'外向性', sub:'社交能量', text:'在聚会或社交场合中，我充满活力，主动与人交谈。',                   key:'E', reverse:false },
  { id:18, trait:'外向性', sub:'社交能量', text:'和很多人待在一起让我感到充电和兴奋，而不是消耗。',                 key:'E', reverse:false },
  { id:19, trait:'外向性', sub:'主导表达', text:'在群体讨论中，我经常是那个首先发言或主导话题的人。',               key:'E', reverse:false },
  { id:20, trait:'外向性', sub:'主导表达', text:'我喜欢成为人们关注的焦点，不介意在众人面前表现自己。',             key:'E', reverse:false },
  { id:21, trait:'外向性', sub:'积极情绪', text:'我总体上是一个乐观开朗的人，经常感到快乐和满足。',                 key:'E', reverse:false },
  { id:22, trait:'外向性', sub:'积极情绪', text:'我容易对生活充满热情，常常感染身边的人。',                         key:'E', reverse:false },
  { id:23, trait:'外向性', sub:'社交能量', text:'我更享受独处或小范围的深度交流，嘈杂的社交让我感到疲惫。',         key:'E', reverse:true },
  { id:24, trait:'外向性', sub:'主导表达', text:'在社交场合我通常比较安静，不太主动发起话题。',                     key:'E', reverse:true },

  // A = Agreeableness (宜人性) —— 共情关怀 / 合作妥协 / 信任善意
  { id:25, trait:'宜人性', sub:'共情关怀', text:'看到别人遇到困难或伤心，我会本能地想要帮忙和安慰。',               key:'A', reverse:false },
  { id:26, trait:'宜人性', sub:'共情关怀', text:'我很容易感受到他人的情绪状态，好像那是我自己的一样。',             key:'A', reverse:false },
  { id:27, trait:'宜人性', sub:'合作妥协', text:'我尽量避免与人发生冲突，即使需要牺牲一些自己的利益也会选择妥协。', key:'A', reverse:false },
  { id:28, trait:'宜人性', sub:'合作妥协', text:'在团队合作中，我乐于配合他人，不太计较个人得失。',                 key:'A', reverse:false },
  { id:29, trait:'宜人性', sub:'信任善意', text:'我相信大多数人本质上是善良的，我愿意给别人第二次机会。',           key:'A', reverse:false },
  { id:30, trait:'宜人性', sub:'信任善意', text:'即使陌生人向我求助，我也倾向于相信对方。',                         key:'A', reverse:false },
  { id:31, trait:'宜人性', sub:'共情关怀', text:'有时候我会把自己的需求放在第一位，即使这会影响到别人的利益。',     key:'A', reverse:true },
  { id:32, trait:'宜人性', sub:'合作妥协', text:'当别人做错事时，我不会轻易原谅，而是会让他们承担后果。',           key:'A', reverse:true },

  // N = Neuroticism/情绪稳定性 —— 焦虑倾向 / 情绪波动 / 自信抗压
  { id:33, trait:'情绪稳定性', sub:'焦虑倾向', text:'我经常感到焦虑和紧张，即使事情本身并不严重。',                 key:'N', reverse:true },
  { id:34, trait:'情绪稳定性', sub:'焦虑倾向', text:'我容易反复担忧未来，脑子里很难真正放松下来。',                 key:'N', reverse:true },
  { id:35, trait:'情绪稳定性', sub:'情绪波动', text:'我的情绪起伏比较大，容易被小事影响一整天的心情。',             key:'N', reverse:true },
  { id:36, trait:'情绪稳定性', sub:'情绪波动', text:'我会因为别人的一句话或一个表情而反复琢磨很久。',               key:'N', reverse:true },
  { id:37, trait:'情绪稳定性', sub:'自信抗压', text:'即使面对很大的压力，我也能保持冷静和清晰的思考。',             key:'N', reverse:false },
  { id:38, trait:'情绪稳定性', sub:'自信抗压', text:'我对自己的能力和生活总体上感到满意和自信。',                     key:'N', reverse:false },
  { id:39, trait:'情绪稳定性', sub:'焦虑倾向', text:'我是一个心态平和的人，不太容易为小事感到紧张。',                 key:'N', reverse:false },
  { id:40, trait:'情绪稳定性', sub:'自信抗压', text:'挫折和失败不会轻易打倒我，我能较快地从打击中恢复。',           key:'N', reverse:false },
];

// ============================================
// STATE
// ============================================
let currentQ = 0;
let answers = []; // {questionId, score (1-5)}

// ============================================
// FLOW
// ============================================
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function startTest() {
  currentQ = 0;
  answers = [];
  showScreen('quiz');
  renderQuestion();
}

function renderQuestion() {
  const q = QUESTIONS[currentQ];
  const pct = Math.round((currentQ / QUESTIONS.length) * 100);
  document.getElementById('progLabel').textContent = `${currentQ + 1} / ${QUESTIONS.length}`;
  document.getElementById('progPct').textContent = `${pct}%`;
  document.getElementById('progFill').style.width = `${pct}%`;
  // Show back button after first question
  document.getElementById('btnBack').style.visibility = currentQ > 0 ? 'visible' : 'hidden';
  document.getElementById('qTrait').textContent = q.trait;
  document.getElementById('qText').textContent = q.text;

  const scaleEl = document.getElementById('scale');
  const labels = ['非常不同意', '不同意', '中立', '同意', '非常同意'];
  scaleEl.innerHTML = labels.map((l, i) => `
    <button class="scale-btn" onclick="answer(${i + 1}, this)">${l}</button>
  `).join('');

  // Animate card
  const card = document.getElementById('qCard');
  card.style.opacity = '0'; card.style.transform = 'translateY(8px)';
  requestAnimationFrame(() => {
    card.style.transition = 'all 0.3s ease';
    card.style.opacity = '1'; card.style.transform = 'translateY(0)';
  });
}

function answer(score, btn) {
  // Visual feedback
  document.querySelectorAll('.scale-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');

  answers[currentQ] = { questionId: QUESTIONS[currentQ].id, score: score };

  setTimeout(() => {
    currentQ++;
    if (currentQ >= QUESTIONS.length) {
      document.getElementById('progLabel').textContent = `40 / 40`;
      document.getElementById('progPct').textContent = '100%';
      document.getElementById('progFill').style.width = '100%';
      document.getElementById('btnBack').style.visibility = 'hidden';
      setTimeout(showResults, 300);
    } else {
      renderQuestion();
    }
  }, 200);
}

function goBack() {
  if (currentQ <= 0) return;
  currentQ--;
  renderQuestion();
  // Pre-select previous answer if exists
  const prev = answers[currentQ];
  if (prev) {
    setTimeout(() => {
      const btns = document.querySelectorAll('.scale-btn');
      btns.forEach(b => b.classList.remove('selected'));
      if (btns[prev.score - 1]) btns[prev.score - 1].classList.add('selected');
    }, 50);
  }
}

// ============================================
function calcScores() {
  const traits = { O:0, C:0, E:0, A:0, N:0 };
  const counts = { O:0, C:0, E:0, A:0, N:0 };
  // Sub-facets
  const subs = {};
  const subCounts = {};

  answers.forEach((a, idx) => {
    const q = QUESTIONS[idx];
    let raw = a.score;
    if (q.reverse) raw = 6 - raw;
    traits[q.key] += raw;
    counts[q.key]++;

    // Sub-facet tracking
    const subKey = q.key + '_' + q.sub;
    if (!subs[subKey]) { subs[subKey] = 0; subCounts[subKey] = 0; }
    subs[subKey] += raw;
    subCounts[subKey]++;
  });

  // Normalize main traits to 0-100
  const result = {};
  for (const [key, total] of Object.entries(traits)) {
    const min = counts[key];
    const max = counts[key] * 5;
    result[key] = Math.round(((total - min) / (max - min)) * 100);
  }

  // Normalize sub-facets
  result._subs = {};
  for (const [key, total] of Object.entries(subs)) {
    const min = subCounts[key];
    const max = subCounts[key] * 5;
    result._subs[key] = Math.round(((total - min) / (max - min)) * 100);
  }

  return result;
}

  if (E <= 40 && O >= 55) fits.push('独立创作类（写作、编程、研究）');

  if (fits.length === 0) fits.push('灵活适配型——你能适应多种职业环境');
  return fits.slice(0, 3).join('<br>');
}

function generateRelationship(O, E, A, N) {
  if (A >= 55 && E >= 50) return '你在关系中温暖而主动——你享受与人建立连接的过程，善于让对方感到被在乎。你可能需要注意：有时候"讨好"和"真诚"之间的界限会模糊。';
  if (A >= 55 && E <= 45) return '你在关系中细腻而忠诚——你不善于大张旗鼓地表达，但会在细节中体现关怀。你的伴侣可能需要学会"读"你，但读懂之后会发现一个深情而可靠的人。';
  if (A <= 40 && N >= 50) return '你在关系中坦率而直接——你不会拐弯抹角，这让你的人际关系清澈透明。但有时候对方可能需要更多的"温度"而不是"真相"。';
  if (E >= 55 && O >= 55) return '你追求有趣和新鲜的关系体验——你可能会让伴侣感到充满惊喜，但也要注意稳定性同样重要。';
  if (N <= 40) return '你的情绪稳定性是关系中的定海神针——伴侣可能会依赖你的冷静和可靠。但要记得：偶尔展现脆弱也是一种亲密。';
  return '你在关系中展现出灵活和平衡的姿态——能适应不同类型的伴侣，在给予和接受之间找到自己的节奏。';
}

function generateGrowth(O, C, E, A, N) {
  const tips = [];
  if (C >= 70) tips.push('你的尽责性如此之高，可能对自己和他人要求过严。试着允许一些"不完美"——有时候完成比完美更重要。');
  if (C <= 30) tips.push('在自律方面，试着给自己设定小目标而不是大计划。每天只做一件事，积少成多。你不是"懒"——你需要的是"启动"的技巧。');
  if (A >= 70) tips.push('你的宜人性让你广受欢迎，但也要警惕"过度付出"。善良需要边界——学会说"不"并不会让你变成一个坏人。');
  if (A <= 30) tips.push('你的直率是力量，但可以试着在"真相"外面裹一层"共情"。不是说假话，而是选择表达的方式。');
  if (N <= 30) tips.push('你的情绪非常稳定，但要注意：不要因为自己"扛得住"就忽视他人的情绪。有时候一个拥抱比一个解决方案更有效。');
  if (N >= 60) tips.push('你的情绪敏感是天赋也是负担。试着练习正念或写情绪日记——看见自己的情绪，但不被它淹没。你不需要"变坚强"，你需要的是"变柔韧"。');
  if (O >= 70) tips.push('你的好奇心让你充满魅力，但要注意"执行力"——把其中一个想法变成现实，比有一百个想法更重要。');
  if (E >= 65) tips.push('你在人群中如鱼得水，但也给自己留一些独处的时间。真正的能量恢复来自于"安静"，而不是"更热闹"。');
  if (E <= 30) tips.push('你的内向不是缺点。但如果社交是必须的，试着把它看作一种技能而非压力——你可以保持内向，同时掌握社交的"开关"。');

  if (tips.length === 0) tips.push('你的人格在各维度上相对均衡，这本身就是一种力量。继续关注自我觉察——均衡者的成长来自于不断地微调，而非重大改变。');
  return tips.slice(0, 2).join('<br><br>');
}

// ============================================
// RESULTS
// ============================================
function showResults() {
  const scores = calcScores();
  const O=scores.O, C=scores.C, E=scores.E, A=scores.A, N=scores.N;

  // Summary
  document.getElementById('summaryText').innerHTML = generateSummary(scores);

  // Trait cards with sub-facets
  const traitList = document.getElementById('traitList');
  const order = ['O','C','E','A','N'];
  traitList.innerHTML = order.map(key => {
    const info = TRAIT_INFO[key];
    const lvl = getLevel(scores[key]);
    const desc = scores[key] >= 50 ? info.high : info.low;

    // Sub-facets
    let subHtml = '';
    if (info.subs) {
      subHtml = '<div class="sub-facets">';
      for (const [subName, subDesc] of Object.entries(info.subs)) {
        const subKey = key + '_' + subName;
        const subScore = (scores._subs && scores._subs[subKey]) ? scores._subs[subKey] : 50;
        const subCls = subScore >= 65 ? 'high' : (subScore <= 35 ? 'low' : 'mid');
        subHtml += `
          <div class="sub-facet">
            <div class="sub-header"><span class="sub-name">${subName}</span><span class="sub-score">${subScore}</span></div>
            <div class="sub-bar-wrap"><div class="sub-bar-fill ${subCls}" style="width:${subScore}%;"></div></div>
          </div>
        `;
      }
      subHtml += '</div>';
    }

    return `
      <div class="trait-card">
        <div class="trait-header">
          <span class="trait-name">${info.icon} ${info.name}</span>
          <span class="trait-score">${scores[key]}分 · ${lvl.level}</span>
        </div>
        <div class="trait-bar-wrap">
          <div class="trait-bar-fill ${lvl.cls}" style="width: ${lvl.pct}%;"></div>
        </div>
        <div class="trait-labels"><span>低</span><span>高</span></div>
        <div class="trait-desc">${desc}</div>
        ${subHtml}
      </div>
    `;
  }).join('');

  // Career + Relationship insights
  document.getElementById('careerText').innerHTML = generateCareer(O,C,E,A,N);
  document.getElementById('relText').textContent = generateRelationship(O,E,A,N);

  // Growth
  document.getElementById('growthText').innerHTML = generateGrowth(O,C,E,A,N);

  showScreen('results');

  // Animate all bars (main + sub)
  requestAnimationFrame(() => {
    document.querySelectorAll('.trait-bar-fill, .sub-bar-fill').forEach(bar => {
      const w = bar.style.width;
      bar.style.width = '0%';
      requestAnimationFrame(() => { bar.style.width = w; });
    });
  });
}

function showToast(msg) {
  const old = document.querySelector('.toast'); if (old) old.remove();
  const t = document.createElement('div'); t.className = 'toast'; t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2500);
}

function restartTest() {
  currentQ = 0; answers = [];
  showScreen('welcome');
}
